<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="engse207-frontend-health" content="frontend-ok">
  <title>ENGSE207 | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>body { background-color: #f8fafc; color: #334155; } .sidebar-link.active { border-left: 4px solid #10b981; background-color: #ecfdf5; color: #047857; font-weight: 600; }</style>
</head>
<body class="min-h-screen">
  <div id="appLoader" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center">
    <i class="fa-solid fa-circle-notch fa-spin text-5xl text-emerald-500 mb-4"></i>
    <p class="font-bold text-slate-500">Loading system...</p>
  </div>

  <div id="authWrapper" class="fixed inset-0 bg-slate-900 items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
      <div class="text-center mb-6"><h2 class="text-3xl font-bold text-slate-800">🔑 Login</h2></div>
      <div id="loginForm">
        <input type="email" id="loginEmail" value="admin@lab.local" class="w-full p-3 mb-4 border rounded-lg" placeholder="Email">
        <input type="password" id="loginPassword" value="adminpass" class="w-full p-3 mb-6 border rounded-lg" placeholder="Password">
        <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">เข้าสู่ระบบ</button>
        <p class="mt-4 text-center text-sm"><button onclick="toggleAuth('register')" class="text-blue-600">สมัครสมาชิก</button></p>
      </div>
      <div id="registerForm" class="hidden">
        <input type="text" id="regUsername" placeholder="Username" class="w-full p-3 mb-4 border rounded-lg">
        <input type="email" id="regEmail" placeholder="Email" class="w-full p-3 mb-4 border rounded-lg">
        <input type="password" id="regPassword" placeholder="Password" class="w-full p-3 mb-6 border rounded-lg">
        <button onclick="register()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg">สมัครสมาชิก</button>
        <p class="mt-4 text-center text-sm"><button onclick="toggleAuth('login')" class="text-blue-600">กลับไปเข้าสู่ระบบ</button></p>
      </div>
    </div>
  </div>

  <div id="dashboardSection" class="flex h-screen overflow-hidden hidden">
    <aside class="w-64 bg-white border-r p-4 flex flex-col justify-between">
      <div>
        <div class="mb-6 px-4"><span class="bg-emerald-100 text-emerald-800 font-bold px-3 py-1 rounded">ENGSE207</span></div>
        <div class="px-4 text-xs font-bold text-slate-400 mb-2">OVERVIEW</div>
        <button onclick="window.location.reload()" class="sidebar-link active w-full text-left px-4 py-2 mb-2 rounded"><i class="fa-solid fa-table-columns mr-2"></i> Dashboard</button>
        <button onclick="window.location.href='profile.html'" class="sidebar-link w-full text-left px-4 py-2 mb-2 rounded text-slate-500"><i class="fa-solid fa-user mr-2"></i> Profile</button>
        
        <div id="adminMenu" class="hidden mt-4">
          <p class="text-xs font-bold text-purple-400 mb-2 px-4">ADMIN PANEL</p>
          <button onclick="window.location.href='users.html'" class="sidebar-link w-full text-left px-4 py-2 mb-2 rounded text-slate-500"><i class="fa-solid fa-users mr-2"></i> Users Directory</button>
          <button onclick="window.open('logs.html')" class="sidebar-link w-full text-left px-4 py-2 rounded text-slate-500"><i class="fa-solid fa-chart-line mr-2"></i> Log Dashboard ↗</button>
        </div>
      </div>
      <button onclick="logout()" class="text-rose-500 font-bold p-2 bg-rose-50 rounded hover:bg-rose-100"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0">
        <h1 class="text-3xl font-bold text-slate-800">System overview</h1>
        <div class="flex items-center gap-3">
          <div class="text-right">
            <div id="navName" class="font-bold text-slate-700">Loading...</div>
            <div id="navRole" class="text-xs font-bold text-blue-500 uppercase">MEMBER</div>
          </div>
          <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center text-slate-500 text-xl font-bold border-2 border-slate-100">
            <img id="navAvatar" src="" class="w-full h-full object-cover">
          </div>
        </div>
      </header>

      <div class="p-8 flex-1 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-slate-800">Task board</h2>
          <button id="btnNewTask" onclick="openModal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-lg font-bold shadow-sm transition-colors">+ new task</button>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
          <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b">
              <tr>
                <th class="p-4 text-slate-400 font-bold text-sm">ID</th>
                <th class="p-4 text-slate-400 font-bold text-sm">TITLE</th>
                <th class="p-4 text-slate-400 font-bold text-sm">OWNER</th>
                <th class="p-4 text-slate-400 font-bold text-sm">PRIORITY</th>
                <th class="p-4 text-slate-400 font-bold text-sm">STATUS</th>
                <th class="p-4 text-slate-400 font-bold text-sm text-right">ACTION</th>
              </tr>
            </thead>
            <tbody id="taskBody" class="divide-y text-slate-600"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="taskModal" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <h2 id="modalTitle" class="text-2xl font-bold mb-4">New Task</h2>
      <input type="hidden" id="taskId">
      <div class="mb-4">
        <label class="block text-sm font-bold text-slate-500 mb-1">Title</label>
        <input type="text" id="taskTitle" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-bold text-slate-500 mb-1">Description</label>
        <textarea id="taskDesc" rows="3" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-sm font-bold text-slate-500 mb-1">Status</label>
          <select id="taskStatus" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500">
            <option value="TODO">TODO</option>
            <option value="IN_PROGRESS">IN PROGRESS</option>
            <option value="DONE">DONE</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-500 mb-1">Priority</label>
          <select id="taskPriority" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500">
            <option value="low">LOW</option>
            <option value="medium">MEDIUM</option>
            <option value="high">HIGH</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3">
        <button onclick="closeModal()" class="px-5 py-2 rounded-lg text-slate-500 font-bold hover:bg-slate-100 transition-colors">Cancel</button>
        <button onclick="saveTask()" class="px-5 py-2 rounded-lg bg-emerald-500 text-white font-bold hover:bg-emerald-600 transition-colors shadow-md">Save Task</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API = window.APP_CONFIG;
    const token = localStorage.getItem('jwt_token') || localStorage.getItem('token');

    window.onload = async () => { 
      if(token) { 
        await loadData();
        document.getElementById('appLoader').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden'); 
      } else {
        document.getElementById('appLoader').classList.add('hidden');
        document.getElementById('authWrapper').classList.remove('hidden');
        document.getElementById('authWrapper').classList.add('flex');
      }
    };

    function toggleAuth(t) { 
      document.getElementById('loginForm').style.display = t==='login'?'block':'none'; 
      document.getElementById('registerForm').style.display = t==='register'?'block':'none'; 
    }

    async function login() {
      const res = await fetch(API.AUTH_URL+'/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('loginEmail').value, password:document.getElementById('loginPassword').value})});
      const d = await res.json(); 
      if(d.token) { localStorage.setItem('jwt_token', d.token); location.reload(); } else alert('❌ อีเมลหรือรหัสผ่านผิด');
    }

    // 💡 ซ่อมฟังก์ชัน Register ให้แจ้งเตือนชัวร์ๆ
    async function register() {
      const btn = document.querySelector('#registerForm button'); 
      const oldText = btn.innerText; 
      btn.innerText = 'กำลังสมัคร...';
      try {
        const res = await fetch(API.AUTH_URL+'/api/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('regUsername').value, email:document.getElementById('regEmail').value, password:document.getElementById('regPassword').value})});
        const d = await res.json(); 
        btn.innerText = oldText;
        if(res.ok) { 
            alert('✅ สมัครสมาชิกสำเร็จ! กรุณาล็อกอิน'); 
            toggleAuth('login'); 
        } else { 
            alert('❌ ' + (d.error || 'อีเมลหรือชื่อผู้ใช้นี้มีในระบบแล้ว')); 
        }
      } catch(e) { 
        btn.innerText = oldText; 
        alert('❌ ไม่สามารถเชื่อมต่อกับ Auth Service ได้'); 
      }
    }

    function logout() { localStorage.removeItem('jwt_token'); localStorage.removeItem('token'); location.reload(); }

    async function loadData() {
      try {
        const uRes = await fetch(API.USER_URL+'/api/users/me', {headers:{'Authorization':'Bearer '+token}}); 
        if(!uRes.ok) return logout();
        const u = await uRes.json();
        
        document.getElementById('navName').innerText = u.profile.display_name || u.profile.username || 'User';
        const roleEl = document.getElementById('navRole');
        roleEl.innerText = u.profile.role.toUpperCase();
        document.getElementById('navAvatar').src = u.profile.avatar_url || `https://ui-avatars.com/api/?name=${u.profile.username || 'U'}&background=random`;

        if(u.profile.role === 'admin') { 
          roleEl.classList.replace('text-blue-500', 'text-purple-500');
          document.getElementById('adminMenu').classList.remove('hidden'); 
          document.getElementById('btnNewTask').style.display = 'none'; 
        }
        
        const tRes = await fetch(API.TASK_URL+'/api/tasks', {headers:{'Authorization':'Bearer '+token}}); 
        const tData = await tRes.json();
        
        const tbody = document.getElementById('taskBody');
        if(!tData.tasks || tData.tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-400">No tasks found.</td></tr>';
            return;
        }

        tbody.innerHTML = (tData.tasks||[]).map(t => {
          const priorityColor = t.priority === 'high' ? 'bg-rose-100 text-rose-600' : (t.priority === 'low' ? 'bg-slate-100 text-slate-500' : 'bg-amber-100 text-amber-600');
          const statusColor = t.status === 'DONE' ? 'bg-emerald-100 text-emerald-600' : (t.status === 'IN_PROGRESS' ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500');
          
          return `<tr class="hover:bg-slate-50 transition-colors">
            <td class="p-4 text-slate-400">#${t.id}</td>
            <td class="p-4 font-bold text-slate-700">${t.title}<div class="text-xs font-normal text-slate-400 mt-1">${t.description || ''}</div></td>
            <td class="p-4"><span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md"><i class="fa-solid fa-user mr-1"></i> UID: ${t.user_id}</span></td>
            <td class="p-4"><span class="text-[10px] font-bold uppercase px-2 py-1 rounded-md ${priorityColor}">${t.priority}</span></td>
            <td class="p-4"><span class="text-[10px] font-bold uppercase px-2 py-1 rounded-md ${statusColor}">${t.status.replace('_', ' ')}</span></td>
            <td class="p-4 text-right whitespace-nowrap">
              <button onclick="openModal(${t.id}, '${t.title}', '${t.description||''}', '${t.status}', '${t.priority}')" class="text-blue-500 hover:text-blue-700 mr-4 transition-colors" title="แก้ไข"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteTask(${t.id})" class="text-rose-400 hover:text-rose-600 transition-colors" title="ลบ"><i class="fa-solid fa-trash"></i></button>
            </td>
          </tr>`;
        }).join('');
      } catch(e) {}
    }

    function openModal(id='', title='', desc='', status='TODO', priority='medium') {
      document.getElementById('modalTitle').innerText = id ? 'Edit Task' : 'New Task';
      document.getElementById('taskId').value = id;
      document.getElementById('taskTitle').value = title;
      document.getElementById('taskDesc').value = desc;
      document.getElementById('taskStatus').value = status;
      document.getElementById('taskPriority').value = priority;
      document.getElementById('taskModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }

    async function saveTask() {
      const id = document.getElementById('taskId').value;
      const payload = {
         title: document.getElementById('taskTitle').value,
         description: document.getElementById('taskDesc').value,
         status: document.getElementById('taskStatus').value,
         priority: document.getElementById('taskPriority').value
      };
      const url = id ? `${API.TASK_URL}/api/tasks/${id}` : `${API.TASK_URL}/api/tasks`;
      const method = id ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, { method: method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if(res.ok) { closeModal(); loadData(); } else alert('Failed to save task.');
      } catch(e) { alert('Network error'); }
    }

    async function deleteTask(id) {
      if(!confirm('Are you sure you want to delete this task?')) return;
      try {
         await fetch(`${API.TASK_URL}/api/tasks/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
         loadData();
      } catch(e) { alert('Network error'); }
    }
  </script>
</body>
</html>
