<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="engse207-frontend-health" content="frontend-ok">
  <title>ENGSE207 | Profile Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
    .sidebar-link { border-left: 4px solid transparent; }
    .sidebar-link.active { border-left: 4px solid #10b981; background-color: #ecfdf5; color: #047857; font-weight: 600; }
  </style>
</head>
<body class="min-h-screen text-slate-700 flex h-screen overflow-hidden">
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between z-10">
    <div>
      <div class="h-16 flex items-center px-6 border-b border-slate-100 gap-3">
        <span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded">ENGSE207</span>
        <span class="text-slate-400 text-sm">/ Final Lab</span>
      </div>
      <div class="p-4 space-y-6">
        <div>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">OVERVIEW</p>
          <a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-2 rounded-lg text-sm text-slate-600 hover:bg-slate-50 transition-all"><span class="w-2 h-2 rounded-full bg-slate-300"></span> Dashboard</a>
          <a href="profile.html" class="sidebar-link active flex items-center gap-3 px-4 py-2 rounded-lg text-sm transition-all"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Profile</a>
        </div>
      </div>
    </div>
    <div class="p-6">
      <button onclick="logout()" class="w-full flex items-center justify-center gap-2 text-sm font-semibold text-rose-500 bg-rose-50 py-2.5 rounded-xl hover:bg-rose-100 transition"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <main class="flex-1 bg-[#f8fafc] overflow-y-auto p-10">
    <div class="max-w-3xl mx-auto">
      <div class="mb-10">
        <h1 class="text-3xl font-bold text-slate-800">Account Settings</h1>
        <p class="text-slate-400 text-sm mt-1 italic">Manage your profile and presence</p>
      </div>

      <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="bg-slate-900 h-32 relative">
          <div class="absolute -bottom-10 left-10 w-28 h-28 bg-white rounded-2xl border-4 border-white flex items-center justify-center shadow-lg overflow-hidden">
            <img id="profilePreview" src="https://i.pravatar.cc/150?u=guest" class="w-full h-full object-cover bg-white">
          </div>
        </div>
        <div class="p-10 pt-16 space-y-6">
          <div class="p-5 bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-between">
            <div><p class="text-xs font-bold text-slate-500 uppercase tracking-widest">อัพโหลดรูปโปรไฟล์</p><p class="text-[10px] text-slate-400 mt-1">ไฟล์ภาพขนาดไม่เกิน 200KB</p></div>
            <input type="file" id="imageFile" accept="image/*" onchange="previewAndConvertImage()" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-emerald-100 file:text-emerald-700 hover:file:bg-emerald-200 cursor-pointer transition">
            <input type="hidden" id="profileUrl">
          </div>

          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Display Name</label>
            <input type="text" id="displayName" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition text-sm">
          </div>

          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Bio</label>
            <textarea id="bio" rows="4" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 focus:bg-white transition text-sm" placeholder="เขียนอะไรบางอย่าง..."></textarea>
          </div>

          <div class="pt-4 flex gap-4">
            <button onclick="updateProfile()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-emerald-200 transition text-sm flex items-center gap-2"><i class="fa-solid fa-check"></i> Save Profile</button>
            <a href="index.html" class="bg-slate-100 text-slate-500 font-bold py-3 px-8 rounded-xl hover:bg-slate-200 transition text-sm">Back</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';
    
    async function fetchProfile() {
      try {
        const res = await fetch(`${window.APP_CONFIG.USER_URL}/api/users/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (data.profile) {
          document.getElementById('displayName').value = data.profile.display_name || '';
          document.getElementById('bio').value = data.profile.bio || '';
          document.getElementById('profileUrl').value = data.profile.profile_url || '';
          if(data.profile.profile_url) document.getElementById('profilePreview').src = data.profile.profile_url;
        }
      } catch (err) { console.log(err); }
    }
    
    function previewAndConvertImage() {
      const file = document.getElementById('imageFile').files[0]; const reader = new FileReader();
      reader.onloadend = () => { document.getElementById('profilePreview').src = reader.result; document.getElementById('profileUrl').value = reader.result; }
      if (file) { if(file.size > 200000) { alert('รูปขนาดใหญ่เกินไป!'); return; } reader.readAsDataURL(file); }
    }
    
    async function updateProfile() {
      const display_name = document.getElementById('displayName').value, bio = document.getElementById('bio').value, profile_url = document.getElementById('profileUrl').value;
      await fetch(`${window.APP_CONFIG.USER_URL}/api/users/me`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ display_name, bio, profile_url }) });
      alert('อัพเดตเรียบร้อย!');
    }
    
    function logout() { localStorage.removeItem('token'); window.location.href = 'index.html'; }
    fetchProfile();
  </script>
</body>
</html>
