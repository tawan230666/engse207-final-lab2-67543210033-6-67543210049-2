<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ENGSE207 | Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen p-10 flex items-center justify-center">
  <div class="max-w-md w-full mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
    <div class="text-center mb-6">
      <div class="w-24 h-24 mx-auto bg-slate-200 rounded-full mb-3 overflow-hidden flex items-center justify-center border-4 border-white shadow-md">
        <img id="avatarPreview" src="" class="w-full h-full object-cover">
      </div>
      <h1 class="text-2xl font-bold text-slate-800">My Profile</h1>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-bold text-slate-500 mb-1">Avatar URL (ลิงก์รูปภาพ)</label>
      <input type="text" id="avatar_url" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" placeholder="https://...">
    </div>
    <div class="mb-4">
      <label class="block text-sm font-bold text-slate-500 mb-1">Display Name</label>
      <input type="text" id="display_name" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
    </div>
    <div class="mb-6">
      <label class="block text-sm font-bold text-slate-500 mb-1">Bio</label>
      <textarea id="bio" rows="3" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50"></textarea>
    </div>

    <button id="btnSave" onclick="updateProfile()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg transition-colors mb-3 shadow-md">
      <i class="fa-solid fa-floppy-disk mr-2"></i> Save Profile
    </button>
    <button onclick="window.location.href='index.html'" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-lg transition-colors">
      <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
    </button>
  </div>

  <script src="config.js"></script>
  <script>
    const USER = window.APP_CONFIG.USER_URL;
    const token = localStorage.getItem('jwt_token') || localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    async function loadProfile() {
      try {
        const res = await fetch(`${USER}/api/users/me`, { headers: { 'Authorization': `Bearer ${token}` }});
        if (!res.ok) return;
        const data = await res.json();
        const u = data.profile || {};
        
        document.getElementById('display_name').value = u.display_name || u.username || '';
        document.getElementById('bio').value = u.bio || '';
        document.getElementById('avatar_url').value = u.avatar_url || '';
        document.getElementById('avatarPreview').src = u.avatar_url || `https://ui-avatars.com/api/?name=${u.display_name||u.username||'U'}&background=random`;

        if (u.role === 'admin') {
          document.getElementById('btnSave').style.display = 'none';
          document.querySelectorAll('input, textarea').forEach(el => el.disabled = true);
        }
      } catch(e) { console.error(e); }
    }

    async function updateProfile() {
      const display_name = document.getElementById('display_name').value;
      const bio = document.getElementById('bio').value;
      const avatar_url = document.getElementById('avatar_url').value;
      
      try {
        const res = await fetch(`${USER}/api/users/me`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ display_name, bio, avatar_url })
        });
        if (res.ok) {
           alert('✅ บันทึก Profile สำเร็จ!');
           loadProfile(); // โหลดรูปใหม่มาโชว์
        } else alert('❌ เกิดข้อผิดพลาด');
      } catch(e) { alert('❌ เซิร์ฟเวอร์ไม่ตอบสนอง'); }
    }
    loadProfile();
  </script>
</body>
</html>
