<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Task Board - Final Lab Set 2</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --text: #f8fafc; --muted: #94a3b8; --primary: #3b82f6;
      --primary-hover: #2563eb; --danger: #ef4444; --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 800px; }
    .card { background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 2rem; }
    h1, h2 { margin-bottom: 1rem; color: var(--text); text-align: center; }
    input, select, button { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid var(--surface2); background: var(--bg); color: var(--text); outline: none; }
    button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #dc2626; }
    .task-item { background: var(--surface2); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .nav-links { display: flex; justify-content: space-between; margin-bottom: 1rem; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    #dashboardSection, #registerSection { display: none; }
    .toggle-link { text-align: center; display: block; margin-top: -10px; cursor: pointer; color: var(--muted); }
  </style>
</head>
<body>
<div class="container">
  <div id="loginSection" class="card">
    <h1>🔑 เข้าสู่ระบบ</h1>
    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button onclick="login()">เข้าสู่ระบบ</button>
    <span class="toggle-link" onclick="toggleAuth('register')">ยังไม่มีบัญชีใช่ไหม? สมัครสมาชิก</span>
  </div>
  <div id="registerSection" class="card">
    <h1>📝 สมัครสมาชิก</h1>
    <input type="text" id="regUsername" placeholder="Username" required>
    <input type="email" id="regEmail" placeholder="Email" required>
    <input type="password" id="regPassword" placeholder="Password" required>
    <button onclick="register()">สมัครสมาชิก</button>
    <span class="toggle-link" onclick="toggleAuth('login')">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</span>
  </div>
  <div id="dashboardSection">
    <div class="nav-links">
      <h2>📋 จัดการงาน (Tasks)</h2>
      <div>
        <a href="profile.html" style="margin-right: 15px;">👤 หน้าโปรไฟล์</a>
        <button onclick="logout()" class="btn-danger" style="width: auto;">🚪 ออกจากระบบ</button>
      </div>
    </div>
    <div class="card">
      <input type="text" id="taskTitle" placeholder="ชื่องาน (Title)" required>
      <input type="text" id="taskDesc" placeholder="รายละเอียด (Description)">
      <button onclick="createTask()">➕ เพิ่มงานใหม่</button>
    </div>
    <div id="taskList"></div>
  </div>
</div>
<script src="config.js"></script>
<script>
  const token = localStorage.getItem('token');
  if (token) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    fetchTasks();
  }
  function toggleAuth(type) {
    if(type === 'register') {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('registerSection').style.display = 'block';
    } else {
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('registerSection').style.display = 'none';
    }
  }
  async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    try {
      const res = await fetch(`${window.APP_CONFIG.AUTH_URL}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        alert('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ');
        toggleAuth('login');
      } else alert('Error: ' + data.error);
    } catch (err) { alert('ไม่สามารถเชื่อมต่อ Auth Service ได้'); }
  }
  async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch(`${window.APP_CONFIG.AUTH_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        location.reload();
      } else alert('Error: ' + data.error);
    } catch (err) { alert('ไม่สามารถเชื่อมต่อ Auth Service ได้'); }
  }
  function logout() {
    localStorage.removeItem('token');
    location.reload();
  }
  async function fetchTasks() {
    try {
      const res = await fetch(`${window.APP_CONFIG.TASK_URL}/api/tasks`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
      });
      const data = await res.json();
      const taskList = document.getElementById('taskList');
      taskList.innerHTML = '';
      if(data.tasks) {
        data.tasks.forEach(task => {
          taskList.innerHTML += `
            <div class="task-item">
              <div>
                <h3 style="color:var(--text);">${task.title}</h3>
                <p style="color:var(--muted); font-size:14px;">${task.description}</p>
                <small style="color:var(--success);">Status: ${task.status}</small>
              </div>
              <button class="btn-danger" style="width: auto;" onclick="deleteTask(${task.id})">ลบ</button>
            </div>
          `;
        });
      }
    } catch (err) { console.error('Failed to fetch tasks'); }
  }
  async function createTask() {
    const title = document.getElementById('taskTitle').value;
    const description = document.getElementById('taskDesc').value;
    await fetch(`${window.APP_CONFIG.TASK_URL}/api/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
      body: JSON.stringify({ title, description, status: 'TODO' })
    });
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    fetchTasks();
  }
  async function deleteTask(id) {
    await fetch(`${window.APP_CONFIG.TASK_URL}/api/tasks/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    fetchTasks();
  }
</script>
</body>
</html>
