<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👤 Profile - Final Lab Set 2</title>
  <style>
    :root { --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --muted: #94a3b8; --primary: #3b82f6; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
    .card { background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 100%; max-width: 500px; }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    input, textarea, button { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #334155; background: var(--bg); color: var(--text); outline: none; }
    button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
    button:hover { background: #2563eb; }
    a { color: var(--primary); text-decoration: none; display: block; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>👤 ข้อมูลโปรไฟล์</h1>
  <label>ชื่อแสดงผล (Display Name)</label>
  <input type="text" id="displayName" placeholder="Display Name">
  <label>ประวัติย่อ (Bio)</label>
  <textarea id="bio" rows="3" placeholder="เขียนอะไรสักหน่อย..."></textarea>
  <button onclick="updateProfile()">💾 บันทึกโปรไฟล์</button>
  <a href="index.html">⬅️ กลับไปหน้าจัดการงาน</a>
</div>
<script src="config.js"></script>
<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'index.html';
  async function fetchProfile() {
    try {
      const res = await fetch(`${window.APP_CONFIG.USER_URL}/api/users/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.profile) {
        document.getElementById('displayName').value = data.profile.display_name || '';
        document.getElementById('bio').value = data.profile.bio || '';
      }
    } catch (err) { console.error('Failed to load profile'); }
  }
  async function updateProfile() {
    const display_name = document.getElementById('displayName').value;
    const bio = document.getElementById('bio').value;
    try {
      const res = await fetch(`${window.APP_CONFIG.USER_URL}/api/users/me`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ display_name, bio })
      });
      if (res.ok) alert('อัปเดตโปรไฟล์สำเร็จ! 🎉');
      else alert('เกิดข้อผิดพลาดในการอัปเดต');
    } catch (err) { alert('ไม่สามารถเชื่อมต่อ User Service ได้'); }
  }
  fetchProfile();
</script>
</body>
</html>
